name: Auto Update and Pack Traditional Chinese

on:
  # 每天 UTC 2:00 執行（台灣時間早上10:00）
  schedule:
    - cron: '0 2 * * *'

  # 允許手動觸發
  workflow_dispatch:

  # 當 app 分支的工具更新時也觸發
  push:
    branches: [ app ]
    paths:
      - 'Chinese_cn2tw/**'
      - 'updatePackerConfig.js'

jobs:
  update-and-convert:
    name: Update Upstream and Convert to Traditional Chinese
    runs-on: ubuntu-latest
    outputs:
      has-changes: ${{ steps.check-changes.outputs.has-changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Update Minecraft-Mod-Language-Package submodule
        run: |
          # 初始化並更新子模組
          git submodule update --init --remote Minecraft-Mod-Language-Package
          cd Minecraft-Mod-Language-Package
          git checkout main
          git pull origin main
          cd ..

      - name: Check if upstream has changes
        id: check-changes
        run: |
          # 手動觸發時強制執行
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "Manual trigger - forcing execution"
          elif git diff --quiet Minecraft-Mod-Language-Package; then
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "No changes from upstream"
          else
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected from upstream"
          fi

      - name: Merge Chinese_cn2tw from app branch
        if: steps.check-changes.outputs.has-changes == 'true'
        run: |
          git fetch origin app:app
          git checkout app -- Chinese_cn2tw/
          git checkout app -- updatePackerConfig.js

      - name: Setup Node.js
        if: steps.check-changes.outputs.has-changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chinese_cn2tw dependencies
        if: steps.check-changes.outputs.has-changes == 'true'
        run: |
          npm update
          npm install
        working-directory: Chinese_cn2tw

      - name: Convert zh_cn to zh_tw
        if: steps.check-changes.outputs.has-changes == 'true'
        run: npm start
        working-directory: Chinese_cn2tw

      - name: Add zh_tw to packer config
        if: steps.check-changes.outputs.has-changes == 'true'
        run: node updatePackerConfig.js

      - name: Validate zh_tw files were created
        if: steps.check-changes.outputs.has-changes == 'true'
        run: |
          echo "Checking for zh_tw files..."
          zh_tw_count=$(find Minecraft-Mod-Language-Package/projects -name "*zh_tw*" -o -name "*zh-tw*" | wc -l)
          echo "Found $zh_tw_count zh_tw files/directories"
          if [ "$zh_tw_count" -eq 0 ]; then
            echo "ERROR: No zh_tw files were created!"
            exit 1
          fi
          echo "Validation passed: zh_tw files were successfully created"

      - name: Upload converted files as artifact
        if: steps.check-changes.outputs.has-changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: converted-language-files
          path: Minecraft-Mod-Language-Package/
          retention-days: 1

  build-packer:
    name: Build Packer
    needs: update-and-convert
    if: needs.update-and-convert.outputs.has-changes == 'true'
    runs-on: windows-latest

    steps:
      - name: Enable Git long paths
        run: git config --global core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Download converted files
        uses: actions/download-artifact@v4
        with:
          name: converted-language-files
          path: Minecraft-Mod-Language-Package

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build Packer
        run: dotnet publish ./Minecraft-Mod-Language-Package/src/Packer/Packer.csproj -o ./build -r win-x64

      - name: Upload Packer
        uses: actions/upload-artifact@v4
        with:
          name: packer-executable
          path: |
            build/Packer.exe
            build/git2-*.dll
          retention-days: 1

  generate-matrix:
    name: Generate Version Matrix
    needs: [update-and-convert, build-packer]
    if: needs.update-and-convert.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Download converted files
        uses: actions/download-artifact@v4
        with:
          name: converted-language-files
          path: Minecraft-Mod-Language-Package

      - name: Generate version matrix from packer configs
        id: set-matrix
        run: |
          cd Minecraft-Mod-Language-Package/config/packer
          # 取得所有 JSON 檔案（排除 packer-example.json）
          versions=$(ls *.json | grep -v "packer-example.json" | sed 's/\.json$//' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix={\"version\":$versions}" >> $GITHUB_OUTPUT
          echo "Generated matrix: {\"version\":$versions}"

  pack-resources:
    name: Pack Traditional Chinese Resources
    needs: [update-and-convert, build-packer, generate-matrix]
    if: needs.update-and-convert.outputs.has-changes == 'true'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.generate-matrix.outputs.matrix)}}

    steps:
      - name: Enable Git long paths
        run: git config --global core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Download converted files
        uses: actions/download-artifact@v4
        with:
          name: converted-language-files
          path: Minecraft-Mod-Language-Package

      - name: Download Packer
        uses: actions/download-artifact@v4
        with:
          name: packer-executable
          path: build

      - name: Run Packer for ${{ matrix.version }}
        run: ..\build\Packer.exe --version="${{ matrix.version }}"
        working-directory: Minecraft-Mod-Language-Package
        continue-on-error: true

      - name: List generated files
        run: |
          Get-ChildItem -Filter "*.zip" | Format-Table Name, Length, LastWriteTime
          Get-ChildItem -Filter "*.md5" | Format-Table Name, Length, LastWriteTime
        working-directory: Minecraft-Mod-Language-Package
        shell: pwsh
        continue-on-error: true

      - name: Upload Resource Pack for ${{ matrix.version }}
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-Mod-Language-Modpack-zh_tw-${{ matrix.version }}
          path: |
            Minecraft-Mod-Language-Package/Minecraft-Mod-Language-Modpack-${{ matrix.version }}.zip
            Minecraft-Mod-Language-Package/${{ matrix.version }}.md5
        continue-on-error: true

  create-release:
    name: Create Release with Resource Packs
    needs: [update-and-convert, pack-resources]
    if: needs.update-and-convert.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release-meta.outputs.tag_name }}

    steps:
      - name: Create timestamp
        id: timestamp
        run: echo "timestamp=$(date '+%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Set release metadata
        id: release-meta
        run: echo "tag_name=zh_tw-${{ steps.timestamp.outputs.timestamp }}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.zip" -exec cp {} release-assets/ \;
          find artifacts -name "*.md5" -exec cp {} release-assets/ \;
          ls -lah release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release-meta.outputs.tag_name }}
          name: 繁體中文語言包 - ${{ steps.timestamp.outputs.timestamp }}
          body: |
            ## 🌏 Minecraft 模組繁體中文語言包

            此版本自動從 [CFPAOrg/Minecraft-Mod-Language-Package](https://github.com/CFPAOrg/Minecraft-Mod-Language-Package) 更新並轉換為繁體中文。

            ### 📦 包含版本
            - Minecraft 1.12.2
            - Minecraft 1.16 (Forge & Fabric)
            - Minecraft 1.18 (Forge & Fabric)
            - Minecraft 1.19
            - Minecraft 1.20 (Forge & Fabric)
            - Minecraft 1.21 (Forge & Fabric)

            ### 📥 使用方法
            1. 下載對應 Minecraft 版本的 zip 檔案
            2. 將 zip 檔案放入 Minecraft 的 `resourcepacks` 資料夾
            3. 在遊戲中啟用該資源包

            ### 🔄 更新時間
            ${{ steps.timestamp.outputs.timestamp }}

            ---
            🤖 此版本由 GitHub Actions 自動建立
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-index:
    name: Update Version Index
    needs: [update-and-convert, create-release]
    if: needs.update-and-convert.outputs.has-changes == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare index branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin index; then
            git fetch origin index:index
            git switch index
          else
            git switch --orphan index
            find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate version-index.json
        run: |
          TAG='${{ needs.create-release.outputs.tag_name }}'
          find artifacts -name 'Minecraft-Mod-Language-Modpack-*.zip' -printf '%f\n' \
            | sed -E 's/^Minecraft-Mod-Language-Modpack-(.+)\.zip$/\1/' \
            | sort -u \
            | jq -Rn --arg tag "$TAG" '[inputs | select(length > 0)] | map({key: ., value: $tag}) | from_entries' \
            > version-index.json

          cat version-index.json

      - name: Commit and push index
        run: |
          git add version-index.json

          if git diff --staged --quiet; then
            echo "No index changes to commit"
          else
            git commit -m "chore(index): 更新版本索引"
            git push origin index
          fi

  push-changes:
    name: Push Changes to Repository
    needs: [update-and-convert, create-release]
    if: needs.update-and-convert.outputs.has-changes == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Minecraft-Mod-Language-Package submodule
        run: |
          git submodule update --init --remote Minecraft-Mod-Language-Package
          cd Minecraft-Mod-Language-Package
          git checkout main
          git pull origin main
          cd ..

      - name: Download converted files
        uses: actions/download-artifact@v4
        with:
          name: converted-language-files
          path: Minecraft-Mod-Language-Package

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push all changes
        run: |
          # Add the submodule pointer update
          git add Minecraft-Mod-Language-Package

          # Add all zh_tw files (both zh_tw and zh-tw patterns)
          cd Minecraft-Mod-Language-Package
          git add -f projects/**/zh_tw/ projects/**/zh_tw.* projects/**/zh-tw/ projects/**/zh-tw.* config/packer/*.json 2>/dev/null || true
          cd ..

          # Commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🌏 Update traditional Chinese translations $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:master || git push origin HEAD:main
            echo "Changes pushed successfully"
          fi
